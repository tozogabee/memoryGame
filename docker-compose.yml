services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      liquibase:
        condition: service_completed_successfully

  liquibase:
    build:
      context: ./backend
      dockerfile: Dockerfile.liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/liquibase/changelog:/liquibase/changelog
    command: >
      --search-path=/liquibase/changelog,/liquibase/changelog/changes,/liquibase/changelog/changes/sql
      --url=jdbc:postgresql://postgres:${DB_PORT:-5432}/${DB_NAME:-memorygame}
      --username=${DB_USER:-memorygame}
      --password=${DB_PASSWORD:-memorygame}
      --changelog-file=db.changelog-master.yaml
      update

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: