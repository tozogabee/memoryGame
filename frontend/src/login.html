<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game – Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-card">
        <h1>Memory Game</h1>

        <div class="tabs">
            <button id="tab-login" class="tab active" onclick="showTab('login')">Login</button>
            <button id="tab-register" class="tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="field">
                <label>Username</label>
                <input type="text" id="login-username" required autocomplete="username" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="login-password" required autocomplete="current-password" />
            </div>
            <p id="login-error" class="error"></p>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
            <div class="field">
                <label>Username</label>
                <input type="text" id="reg-username" required autocomplete="username" />
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="reg-email" required autocomplete="email" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="reg-password" required autocomplete="new-password" />
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" required autocomplete="new-password" />
            </div>
            <p id="register-error" class="error"></p>
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <!-- Check email notice (shown after successful registration) -->
        <div id="check-email" class="hidden">
            <div class="email-notice">
                <div class="email-icon">✉️</div>
                <h2>Check your inbox!</h2>
                <p id="check-email-msg"></p>
                <button class="btn-submit" onclick="showTab('login')">Back to Login</button>
            </div>
        </div>
    </div>

    <script src="dist/main/login.js"></script>
</body>
</html>
